name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel in-progress runs for the same branch/PR when a new commit lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests with JaCoCo coverage check
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

  frontend:
    name: Frontend — lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test with coverage
        working-directory: frontend
        run: npm run test:coverage -- --maxWorkers=2

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8081/api
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  docker-build:
    name: Docker images build (smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Skip on PRs from forks (can't push images). Plain build only — no push.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v7

      - name: Docker build backend
        run: docker build -t rowing-backend:ci -f backend/Dockerfile backend/

      - name: Docker build frontend
        run: docker build -t rowing-frontend:ci --build-arg NEXT_PUBLIC_API_URL=https://api.example.com/api -f frontend/Dockerfile frontend/

      - name: Trivy — backend image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rowing-backend:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Trivy — frontend image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rowing-frontend:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Trivy — repo filesystem scan (IaC + deps)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'    # advisory; fails only on images above
          severity: CRITICAL,HIGH
          skip-dirs: backend/target,frontend/.next,frontend/node_modules
